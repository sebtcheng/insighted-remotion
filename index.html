						description: "Track progress, validation, and needs across governance levels.",
					},
					{
						title: "Decision-making",
						description: "Give leaders timely context for coordinated and responsive action.",
					},
				],
				caption: "",
				variant: "enter-swipe",
			},
			{
				start: 122.48,
				end: 134.53,
				kicker: "InsightED",
				title: "Timely. Validated. Shared.",
				keywords: ["Governance tool", "Better prepared", "More responsive"],
				bullets: [
					{
						title: "Timely information",
						description: "Bring critical data into view earlier for planning and response.",
					},
					{
						title: "Validated records",
						description: "Strengthen trust by making verification part of the operating flow.",
					},
					{
						title: "Shared visibility",
						description: "Connect stakeholders around the same information and priorities.",
					},
					{
						title: "Coordinated planning",
						description: "Support decisions that are better prepared and more responsive to schools.",
					},
				],
				caption: "",
				variant: "enter-rise",
			},
		];

		const fps = 30;
		const totalFrames = 4036;
		const beatFrames = 3 * fps;
		let currentFrame = 0;
		let isPlaying = false;
		let playInterval = null;
		let lastSceneIndex = -1;
		let lastBeatId = "";

		const audio = new Audio();
		const bgm = new Audio('./public/audio_tracks/InsightED_Video_BGM.mp3');
		bgm.volume = 0.125;
		bgm.loop = true;

		function syncAudio(sceneIndex, localFrame) {
			const src = `./public/audio_tracks/InsightED_PrimerVid_SL${sceneIndex + 1}.mp3`;
			if (audio.src !== new URL(src, window.location.href).href) {
				audio.src = src;
				audio.load();
			}
			const localSeconds = localFrame / fps;
			const offset = sceneIndex === 0 ? 2.0 : 0.5;
			const targetTime = localSeconds - offset;
			if (targetTime < 0) {
				audio.pause();
				audio.currentTime = 0;
				return;
			}
			if (Math.abs(audio.currentTime - targetTime) > 0.15) {
				audio.currentTime = targetTime;
			}
			if (isPlaying) {
				if (audio.paused) {
					audio.play().catch(e => console.log("Audio playback deferred for user gesture: ", e));
				}
			} else {
				audio.pause();
			}
		}

		const canvasFrame = document.getElementById("canvas-frame");
		const container = document.getElementById("player-container");
		const timeline = document.getElementById("timeline");
		const timeDisplay = document.getElementById("time-display");
		const playPauseBtn = document.getElementById("play-pause-btn");
		const prevBtn = document.getElementById("prev-btn");
		const nextBtn = document.getElementById("next-btn");
		const sceneSelector = document.getElementById("scene-selector");
		const sceneBody = document.getElementById("scene-body");
		const kickerEl = document.getElementById("kicker-el");
		const titleEl = document.getElementById("title-el");
		const keywordRow = document.getElementById("keyword-row");
		const bulletList = document.getElementById("bullet-list");
		const captionEl = document.getElementById("caption-el");
		const progressFillEl = document.getElementById("progress-fill-el");

		function resizeCanvas() {
			const scaleX = container.clientWidth / 1920;
			const scaleY = container.clientHeight / 1080;
			canvasFrame.style.transform = `scale(${Math.min(scaleX, scaleY)})`;
		}

		window.addEventListener("resize", resizeCanvas);
		resizeCanvas();

		function buildSceneSelector() {
			scenes.forEach((scene, index) => {
				const tab = document.createElement("button");
				tab.className = "scene-tab";
				tab.innerText = `Scene ${index + 1}: ${scene.title}`;
				tab.onclick = () => jumpToFrame(scene.start * fps);
				sceneSelector.appendChild(tab);
			});
		}

		buildSceneSelector();

		function getActiveScene(frame) {
			const seconds = frame / fps;
			return scenes.find(scene => seconds >= scene.start && seconds < scene.end) || scenes[scenes.length - 1];
		}

		function renderScene(scene, sceneIndex) {
			if (lastSceneIndex === sceneIndex) return;
			lastSceneIndex = sceneIndex;

			sceneBody.className = `sceneBody ${scene.variant}`;
			void sceneBody.offsetWidth;

			kickerEl.innerText = scene.kicker;
			if (scene.title === "InsightED") {
				titleEl.innerHTML = `<span class="brandInsight">Insight</span><span class="brandEd">ED</span>`;
			} else {
				titleEl.innerText = scene.title;
			}

			keywordRow.innerHTML = "";
			scene.keywords.forEach(keyword => {
				const item = document.createElement("span");
				item.className = "keyword";
				item.innerText = keyword;
				keywordRow.appendChild(item);
			});

			bulletList.innerHTML = "";
			scene.bullets.forEach(bullet => {
				const item = document.createElement("li");
				item.className = "bullet";
				if (typeof bullet === "string") {
					item.innerText = bullet;
				} else {
					item.innerHTML = `
						<div class="bulletText">
							<span class="bulletTitle">${bullet.title}</span>
							<span class="bulletDescription">${bullet.description}</span>
						</div>
					`;
				}
				bulletList.appendChild(item);
			});

			captionEl.innerText = scene.caption;
			captionEl.style.display = scene.caption ? "block" : "none";
		}

		function applyBeat(scene, sceneIndex, localFrame) {
			const beatIndex = Math.floor(localFrame / beatFrames);
			const beatId = `${sceneIndex}-${beatIndex}`;
			sceneBody.classList.toggle("settled", localFrame > 30);

			if (beatId !== lastBeatId) {
				lastBeatId = beatId;
			}
		}

		function updateFrame(frame) {
			currentFrame = Math.max(0, Math.min(totalFrames, frame));
			timeline.value = currentFrame;

			const seconds = currentFrame / fps;
			timeDisplay.innerText = `${seconds.toFixed(1)}s / ${(totalFrames / fps).toFixed(1)}s`;

			const scene = getActiveScene(currentFrame);
			const sceneIndex = scenes.indexOf(scene);
			const sceneFrameDuration = (scene.end - scene.start) * fps;
			const localFrame = currentFrame - scene.start * fps;
			const progress = Math.max(0, Math.min(1, localFrame / sceneFrameDuration));

			renderScene(scene, sceneIndex);
			applyBeat(scene, sceneIndex, localFrame);
			progressFillEl.style.width = `${progress * 100}%`;
			syncAudio(sceneIndex, localFrame);

			const baseBgmVolume = 0.125;
			const isNarrationPlaying = !audio.paused && !audio.ended && audio.currentTime > 0;
			const currentBgmMax = isNarrationPlaying ? (baseBgmVolume * 0.85) : (baseBgmVolume * 1.15);

			if (currentFrame >= totalFrames - 60) {
				const fadeProgress = (currentFrame - (totalFrames - 60)) / 60;
				bgm.volume = Math.max(0, currentBgmMax * (1 - fadeProgress));
			} else {
				bgm.volume = currentBgmMax;
			}

			document.querySelectorAll(".scene-tab").forEach((tab, index) => {
				if (index === sceneIndex) {
					tab.classList.add("active");
					tab.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
				} else {
					tab.classList.remove("active");
				}
			});
		}

		function jumpToFrame(frame) {
			updateFrame(frame);
			bgm.currentTime = frame / fps;
		}

		function play() {
			if (isPlaying) return;
			isPlaying = true;
			playPauseBtn.innerText = "Pause";
			playPauseBtn.classList.add("active");
			bgm.play().catch(e => console.log("BGM play deferred: ", e));
			playInterval = setInterval(() => {
				if (currentFrame >= totalFrames) {
					currentFrame = 0;
					bgm.currentTime = 0;
				}
				updateFrame(currentFrame + 1);
			}, 1000 / fps);
		}

		function pause() {
			if (!isPlaying) return;
			isPlaying = false;
			playPauseBtn.innerText = "Play";
			playPauseBtn.classList.remove("active");
			clearInterval(playInterval);
			audio.pause();
			bgm.pause();
		}

		playPauseBtn.onclick = () => isPlaying ? pause() : play();

		timeline.oninput = event => {
			pause();
			const frame = parseInt(event.target.value, 10);
			updateFrame(frame);
			bgm.currentTime = frame / fps;
		};

		prevBtn.onclick = () => {
			pause();
			const index = scenes.indexOf(getActiveScene(currentFrame));
			jumpToFrame(index > 0 ? scenes[index - 1].start * fps : 0);
		};

		nextBtn.onclick = () => {
			pause();
			const index = scenes.indexOf(getActiveScene(currentFrame));
			jumpToFrame(index < scenes.length - 1 ? scenes[index + 1].start * fps : 0);
		};

		updateFrame(0);
	</script>
</body>

</html>
